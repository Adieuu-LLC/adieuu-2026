# Local development services
# Usage: docker-compose up -d

services:
  redis:
    image: redis:8.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:8.2.5
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: adieuu
    command: ["mongod", "--setParameter", "tcmallocEnableBackgroundThread=false"] # address a tcmalloc failure
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # LiveKit -- local video/audio/screenshare SFU
  #
  # Always started with core services (no profile required).
  # API env: LIVEKIT_API_KEY=devkey, LIVEKIT_API_SECRET=devsecret
  # Client env: VITE_LIVEKIT_URL=ws://localhost:7880
  # ---------------------------------------------------------------------------

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50060:50000-50060/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"
    command: --dev --bind 0.0.0.0

volumes:
  redis_data:
  mongo_data:
