# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Overall project coverage settings
  status:
    project:
      default:
        # Coverage target - warn if below this threshold
        target: 80%
        # Allow coverage to drop by this amount before failing
        threshold: 2%
        # Only check coverage on files changed in the PR
        only_pulls: true
    patch:
      default:
        # Require new code to have at least this coverage
        target: 70%
        threshold: 5%

  # Precision of coverage percentage (0-5 decimal places)
  precision: 2

  # Round coverage values: down, up, nearest
  round: nearest

  # Range for coverage color coding
  range: "60...90"

# Configure how coverage is reported in PRs
comment:
  # Layout of the comment
  layout: "reach,diff,flags,files"
  # Behavior: default, once, new, spammed
  behavior: default
  # Require changes to post comment
  require_changes: false
  # Only post on pull requests
  require_base: false
  require_head: false

# Flags to group coverage by component
flags:
  api:
    paths:
      - apps/api/src/
    carryforward: true

# Ignore certain files from coverage
ignore:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/test-setup.ts"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/*.d.ts"

# GitHub integration settings
github_checks:
  annotations: true
