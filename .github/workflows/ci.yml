name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Group by workflow + branch/PR, so each branch/PR has its own concurrency group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Cancel in-progress runs when a new run is triggered
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  NODE_VERSION: '25'
  PNPM_VERSION: '9'
  # Disable Turborepo telemetry
  # https://turborepo.dev/docs/telemetry
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/ui --filter @adieuu/tsconfig

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  build-web:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-security, test-fs]
    env:
      # Production URLs injected at build time via GitHub Secrets
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CHAT_WS_URL: ${{ secrets.VITE_CHAT_WS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --filter @adieuu/web...

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  test-api:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/tsconfig

      - name: Run API tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --reporter=junit --reporter-outfile=junit.xml
        working-directory: apps/api

      - name: Fix coverage paths
        run: sed -i 's|SF:src/|SF:apps/api/src/|g' apps/api/coverage/lcov.info

      - name: Fix test result paths
        run: sed -i 's|file="src/|file="apps/api/src/|g' apps/api/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: api
          name: api-coverage
          report_type: coverage
          files: ./apps/api/coverage/lcov.info
          fail_ci_if_error: false

      # Test results don't seem to parse correctly on CodeCov side, so investigate later when we have time
      # - name: Upload test results to Codecov
      #   if: ${{ !cancelled() }}
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     flags: api
      #     name: api-tests
      #     files: ./apps/api/junit.xml
      #     report_type: test_results
      #     fail_ci_if_error: false
      #     verbose: true

  test-security:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/ui --filter @adieuu/tsconfig

      - name: Run security regression suite
        run: pnpm test:security

  test-fs:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/ui --filter @adieuu/tsconfig

      - name: Run forward secrecy regression suite
        run: pnpm test:fs

  build-api:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-api, test-security, test-fs]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --filter @adieuu/api...

  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: desktop-linux
            artifact-path: apps/desktop/out/*.AppImage
          - os: windows-latest
            artifact-name: desktop-windows
            artifact-path: apps/desktop/out/*.exe
          - os: macos-latest
            artifact-name: desktop-macos
            artifact-path: apps/desktop/out/*.dmg
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck, test-security, test-fs]
    env:
      # Production URLs injected at build time via GitHub Secrets
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_CHAT_WS_URL: ${{ secrets.VITE_CHAT_WS_URL }}
      # Cache Electron binaries to avoid re-downloading
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.ELECTRON_CACHE }}
          key: electron-${{ runner.os }}-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/ui --filter @adieuu/tsconfig

      - name: Build Electron app
        run: pnpm build --filter @adieuu/desktop

      - name: Package Electron app
        run: pnpm --filter @adieuu/desktop package

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  sbom:
    runs-on: ubuntu-latest
    needs: [build-web, build-api, build-desktop]
    # Only generate SBOM on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            path: apps/api
          - app: web
            path: apps/web
          - app: desktop
            path: apps/desktop
          # Mobile doesn't have a build job yet, but we can still generate its SBOM
          - app: mobile
            path: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: echo "version=$(jq -r .version ${{ matrix.path }}/package.json)" >> $GITHUB_OUTPUT

      - name: Generate and upload SBOM
        # SBOM generation is best-effort; don't fail CI if upload has transient issues
        continue-on-error: true
        uses: manifest-cyber/manifest-github-action@v1.6.0
        with:
          apiKey: ${{ secrets.MANIFEST_API_KEY }}
          path: ${{ matrix.path }}
          relationship: 'first'
          sbomName: 'adieuu-${{ matrix.app }}'
          sbomVersion: '${{ steps.version.outputs.version }}'
          sbomGenerator: 'cdxgen'
          asset-labels: 'adieuu,environment-${{ matrix.app }},v${{ steps.version.outputs.version }},oss,generated-pipeline'
          active: true
          sbomArtifactName: 'adieuu-${{ matrix.app }}-${{ steps.version.outputs.version }}-sbom.json'
