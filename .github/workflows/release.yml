name: Release

on:
  # Run after CI completes successfully on main
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allow manual releases
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (leave empty for auto-detection from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

env:
  NODE_VERSION: '25'
  PNPM_VERSION: '9'

concurrency:
  # Only one release at a time
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Automatic release requires CI success from a push event; manual dispatch always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      released: ${{ steps.version.outputs.released }}
      deploy_aws: ${{ steps.decide_deploy_aws.outputs.deploy || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # For auto-releases, pin to the exact commit CI validated.
          # For manual runs, use the latest main branch.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}

      - name: Check if release commit
        id: check_release
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            git fetch origin main --depth=1
            HEAD_SHA=$(git rev-parse HEAD)
            MAIN_SHA=$(git rev-parse origin/main)
            if [ "$HEAD_SHA" != "$MAIN_SHA" ]; then
              echo "Skipping release - CI run is stale. tested=$HEAD_SHA current_main=$MAIN_SHA"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if [[ "$COMMIT_MSG" == chore\(release\):* ]]; then
            echo "Skipping release - this is a release commit: $COMMIT_MSG"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v3
        if: steps.check_release.outputs.skip != 'true'
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        if: steps.check_release.outputs.skip != 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No cache needed - this job only does version bumps, not installs

      - name: Configure Git for signed commits
        if: steps.check_release.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        if: steps.check_release.outputs.skip != 'true'
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Determine version bump
        if: steps.check_release.outputs.skip != 'true'
        id: bump
        run: |
          # Use manual input if provided
          if [ -n "${{ github.event.inputs.bump }}" ]; then
            echo "type=${{ github.event.inputs.bump }}" >> $GITHUB_OUTPUT
            echo "Using manual bump: ${{ github.event.inputs.bump }}"
            exit 0
          fi

          # Auto-detect from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, check all commits
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" ${LAST_TAG}..HEAD)
          fi

          # Check for breaking changes (major)
          if echo "$COMMITS" | grep -qiE "^.*!:|BREAKING CHANGE:"; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "Detected: major (breaking change)"
            exit 0
          fi

          # Check for features (minor)
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Detected: minor (new feature)"
            exit 0
          fi

          # Default to patch
          echo "type=patch" >> $GITHUB_OUTPUT
          echo "Detected: patch (default)"

      - name: Calculate new version
        if: steps.check_release.outputs.skip != 'true'
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          # Parse current version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Handle initial 0.0.0 version
          if [ "$CURRENT" = "0.0.0" ]; then
            NEW_VERSION="0.1.0"
          else
            case $BUMP in
              major)
                NEW_VERSION="$((MAJOR + 1)).0.0"
                ;;
              minor)
                NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
                ;;
              patch)
                NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
            esac
          fi

          # Check if tag already exists
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEW_VERSION} already exists, skipping release"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "released=false" >> $GITHUB_OUTPUT
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "released=true" >> $GITHUB_OUTPUT
          echo "tag_exists=false" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Decide AWS deploy
        id: decide_deploy_aws
        if: steps.check_release.outputs.skip != 'true'
        run: |
          if [ "${{ steps.version.outputs.released }}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ steps.version.outputs.tag_exists }}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "deploy=false" >> $GITHUB_OUTPUT

      - name: Update package versions
        if: steps.version.outputs.released == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          # Update all app package.json files
          for pkg in apps/desktop apps/web apps/api apps/mobile; do
            if [ -f "$pkg/package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$pkg/package.json', 'utf8'));
                pkg.version = '$NEW_VERSION';
                fs.writeFileSync('$pkg/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Updated $pkg to $NEW_VERSION"
            fi
          done

          # Update shared packages too
          for pkg in packages/shared packages/ui; do
            if [ -f "$pkg/package.json" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$pkg/package.json', 'utf8'));
                pkg.version = '$NEW_VERSION';
                fs.writeFileSync('$pkg/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "Updated $pkg to $NEW_VERSION"
            fi
          done

      - name: Commit version bump
        if: steps.version.outputs.released == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          # workflow_run checks out head_sha (detached HEAD), so there is no local "main".
          # Create/update main at HEAD so "git push origin main" works.
          git checkout -B main
          git add .
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Create draft release
        if: steps.version.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-aws:
    needs: release
    if: needs.release.outputs.deploy_aws == 'true'
    # Reusable workflow uses OIDC for AWS; caller must grant id-token: write (default is none).
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-aws-reusable.yml
    secrets: inherit

  build-and-release-desktop:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: desktop-linux
          - os: windows-latest
            artifact-name: desktop-windows
          - os: macos-latest
            artifact-name: desktop-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get the updated version

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter @adieuu/shared --filter @adieuu/ui --filter @adieuu/tsconfig

      - name: Build Electron app
        run: pnpm build --filter @adieuu/desktop

      - name: Package Electron app
        run: pnpm --filter @adieuu/desktop run package:ci

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.new_version }}
          draft: true
          files: |
            apps/desktop/out/*.exe
            apps/desktop/out/*.exe.blockmap
            apps/desktop/out/*.dmg
            apps/desktop/out/*.zip
            apps/desktop/out/*.zip.blockmap
            apps/desktop/out/*.AppImage
            apps/desktop/out/*.deb
            apps/desktop/out/*.rpm
            apps/desktop/out/latest.yml
            apps/desktop/out/latest-mac.yml
            apps/desktop/out/latest-linux.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts for S3 mirror
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: apps/desktop/out/
          retention-days: 1
          if-no-files-found: warn

  # Generate SBOMs for release and upload as workflow artifacts first.
  generate-sboms:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            path: apps/api
          - app: web
            path: apps/web
          - app: desktop
            path: apps/desktop
          - app: mobile
            path: apps/mobile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate SBOM
        continue-on-error: true
        uses: manifest-cyber/manifest-github-action@v1.6.0
        with:
          apiKey: ${{ secrets.MANIFEST_API_KEY }}
          sbomPublish: false
          path: ${{ matrix.path }}
          relationship: 'first'
          sbomName: 'adieuu-${{ matrix.app }}'
          sbomVersion: '${{ needs.release.outputs.new_version }}'
          sbomGenerator: 'cdxgen'
          asset-labels: 'adieuu,environment-${{ matrix.app }},v${{ needs.release.outputs.new_version }},oss,generated-pipeline'
          active: true
          sbomArtifactName: 'adieuu-${{ matrix.app }}-${{ needs.release.outputs.new_version }}-sbom.json'

  # Attach generated SBOM artifacts to draft release.
  attach-sboms:
    needs: [release, generate-sboms]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: adieuu-*-*-sbom.json
          path: sboms
          merge-multiple: true

      - name: List downloaded SBOMs
        run: |
          echo "Downloaded SBOM files:"
          find sboms -type f -name "*.json" 2>/dev/null || echo "No SBOM files found"

      - name: Upload SBOMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.new_version }}
          draft: true
          files: sboms/**/*.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Sync desktop artifacts + SBOMs to S3 downloads bucket and manifests to
  # the private manifest bucket. Runs only when the downloads stack variables
  # are configured (otherwise skipped gracefully).
  sync-downloads-mirror:
    needs: [release, build-and-release-desktop, attach-sboms]
    if: |
      always() &&
      needs.release.outputs.released == 'true' &&
      needs.build-and-release-desktop.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check downloads stack variables
        id: check_vars
        run: |
          if [ -z "${{ vars.DEPLOY_DOWNLOADS_S3_BUCKET_ADIEUU }}" ] || \
             [ -z "${{ vars.DEPLOY_RELEASE_MANIFESTS_S3_BUCKET_ADIEUU }}" ] || \
             [ -z "${{ vars.DEPLOY_DOWNLOADS_CLOUDFRONT_DISTRIBUTION_ID_ADIEUU }}" ]; then
            echo "Downloads stack variables not set, skipping S3 mirror sync."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download desktop artifacts
        if: steps.check_vars.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: true

      - name: Download SBOM artifacts
        if: steps.check_vars.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: adieuu-*-*-sbom.json
          path: sboms
          merge-multiple: true
        continue-on-error: true

      - name: Configure AWS credentials
        if: steps.check_vars.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_ADIEUU }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync binaries to S3 downloads bucket
        if: steps.check_vars.outputs.skip != 'true'
        run: |
          VERSION="v${{ needs.release.outputs.new_version }}"
          BUCKET="${{ vars.DEPLOY_DOWNLOADS_S3_BUCKET_ADIEUU }}"

          echo "Syncing desktop binaries to s3://${BUCKET}..."

          # latest/ channel for auto-update (exclude manifest yml files)
          aws s3 sync desktop-artifacts/ "s3://${BUCKET}/latest/" \
            --exclude "latest.yml" \
            --exclude "latest-mac.yml" \
            --exclude "latest-linux.yml" \
            --exclude "*.blockmap" \
            --size-only

          # Blockmaps go to latest/ too (needed by electron-updater for delta)
          aws s3 sync desktop-artifacts/ "s3://${BUCKET}/latest/" \
            --include "*.blockmap" \
            --exclude "*" \
            --size-only

          # Immutable versioned copy
          aws s3 sync desktop-artifacts/ "s3://${BUCKET}/${VERSION}/desktop/" \
            --exclude "latest.yml" \
            --exclude "latest-mac.yml" \
            --exclude "latest-linux.yml"

      - name: Sync manifests to private manifest bucket
        if: steps.check_vars.outputs.skip != 'true'
        run: |
          MANIFESTS_BUCKET="${{ vars.DEPLOY_RELEASE_MANIFESTS_S3_BUCKET_ADIEUU }}"

          for f in latest.yml latest-mac.yml latest-linux.yml; do
            if [ -f "desktop-artifacts/${f}" ]; then
              echo "Uploading manifest: ${f}"
              aws s3 cp "desktop-artifacts/${f}" "s3://${MANIFESTS_BUCKET}/${f}"
            fi
          done

      - name: Sync SBOMs to downloads bucket
        if: steps.check_vars.outputs.skip != 'true'
        run: |
          VERSION="v${{ needs.release.outputs.new_version }}"
          BUCKET="${{ vars.DEPLOY_DOWNLOADS_S3_BUCKET_ADIEUU }}"

          if [ -d sboms ] && [ "$(find sboms -name '*.json' 2>/dev/null | head -1)" ]; then
            echo "Syncing SBOMs to s3://${BUCKET}/${VERSION}/sbom/"
            aws s3 sync sboms/ "s3://${BUCKET}/${VERSION}/sbom/"
          else
            echo "No SBOM files found, skipping."
          fi

      - name: Generate and upload releases.json
        if: steps.check_vars.outputs.skip != 'true'
        run: |
          VERSION="${{ needs.release.outputs.new_version }}"
          BUCKET="${{ vars.DEPLOY_DOWNLOADS_S3_BUCKET_ADIEUU }}"
          BASE_URL="https://${{ vars.DEPLOY_DOWNLOADS_DOMAIN_ADIEUU || 'downloads.adieuu.com' }}"

          # Download existing releases.json (if any) and append the new version
          aws s3 cp "s3://${BUCKET}/releases.json" existing-releases.json 2>/dev/null || echo '[]' > existing-releases.json

          node -e "
            const fs = require('fs');
            const existing = JSON.parse(fs.readFileSync('existing-releases.json', 'utf8'));
            const entries = Array.isArray(existing) ? existing : [];

            // Avoid duplicate entries for the same version
            const filtered = entries.filter(e => e.version !== '${VERSION}');

            const newEntry = {
              version: '${VERSION}',
              date: new Date().toISOString(),
              downloads: {
                base: '${BASE_URL}/v${VERSION}/desktop/',
                sbom: '${BASE_URL}/v${VERSION}/sbom/',
              },
              github: 'https://github.com/Adieuu-LLC/adieuu-2026/releases/tag/v${VERSION}',
            };

            filtered.unshift(newEntry);

            // Keep last 50 releases
            const trimmed = filtered.slice(0, 50);
            fs.writeFileSync('releases.json', JSON.stringify(trimmed, null, 2));
          "

          aws s3 cp releases.json "s3://${BUCKET}/releases.json" \
            --content-type "application/json"

      - name: Invalidate CloudFront
        if: steps.check_vars.outputs.skip != 'true'
        run: |
          VERSION="v${{ needs.release.outputs.new_version }}"
          DISTRIBUTION_ID="${{ vars.DEPLOY_DOWNLOADS_CLOUDFRONT_DISTRIBUTION_ID_ADIEUU }}"

          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/latest/*" "/${VERSION}/*" "/releases.json"

  publish-release:
    needs: [release, build-and-release-desktop, attach-sboms]
    # Run even if SBOM jobs were skipped or failed (best-effort)
    if: |
      always() &&
      needs.release.outputs.released == 'true' &&
      needs.build-and-release-desktop.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.new_version }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
