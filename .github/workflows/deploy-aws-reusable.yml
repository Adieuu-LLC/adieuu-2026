name: Deploy AWS (reusable)

# Called from release.yml (after the release job) or from deploy-aws.yml (manual).
# Full deploy (web + api + chat) so the tree matches main — path filters are wrong for
# release-only commits that only touch package.json versions.

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (branch or SHA)'
        type: string
        required: false
        default: 'main'

concurrency:
  group: deploy-aws-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NODE_VERSION: '25'
  FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.set.outputs.web }}
      api: ${{ steps.set.outputs.api }}
      chat: ${{ steps.set.outputs.chat }}
      deploy_sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Record deploy commit
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy targets (full)
        id: set
        run: |
          echo "web=true" >> "$GITHUB_OUTPUT"
          echo "api=true" >> "$GITHUB_OUTPUT"
          echo "chat=true" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' &&
      vars.DEPLOY_WEB_S3_BUCKET_ADIEUU != '' &&
      vars.DEPLOY_CLOUDFRONT_DISTRIBUTION_ID_ADIEUU != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.changes.outputs.deploy_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_ADIEUU }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          # Public API/WebSocket URLs for the browser bundle (cross-origin to app hostname).
          VITE_API_BASE_URL: ${{ vars.DEPLOY_WEB_VITE_API_BASE_URL_ADIEUU }}
          VITE_CHAT_WS_URL: ${{ vars.DEPLOY_WEB_VITE_CHAT_WS_URL_ADIEUU }}
        run: |
          if [ -z "${VITE_API_BASE_URL:-}" ]; then
            echo "::error::Set Actions variable DEPLOY_WEB_VITE_API_BASE_URL_ADIEUU (e.g. https://api.example.com)"
            exit 1
          fi
          if [ -z "${VITE_CHAT_WS_URL:-}" ]; then
            echo "::error::Set Actions variable DEPLOY_WEB_VITE_CHAT_WS_URL_ADIEUU (e.g. wss://api.example.com/ws/chat)"
            exit 1
          fi
          pnpm build --filter @adieuu/web...

      - name: Sync to S3
        run: aws s3 sync apps/web/dist "s3://${{ vars.DEPLOY_WEB_S3_BUCKET_ADIEUU }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DEPLOY_CLOUDFRONT_DISTRIBUTION_ID_ADIEUU }}" \
            --paths "/*"

  deploy-api:
    needs: changes
    if: |
      needs.changes.outputs.api == 'true' &&
      vars.DEPLOY_ECR_API_REPOSITORY_URL_ADIEUU != '' &&
      vars.DEPLOY_ECS_CLUSTER_NAME_ADIEUU != '' &&
      vars.DEPLOY_ECS_SERVICE_API_ADIEUU != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.changes.outputs.deploy_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_ADIEUU }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          DEPLOY_SHA: ${{ needs.changes.outputs.deploy_sha }}
        run: |
          IMG="${{ vars.DEPLOY_ECR_API_REPOSITORY_URL_ADIEUU }}"
          docker build --platform linux/amd64 -f apps/api/Dockerfile \
            --build-arg FONTAWESOME_TOKEN="${FONTAWESOME_TOKEN}" \
            -t "api:${DEPLOY_SHA}" .
          docker tag "api:${DEPLOY_SHA}" "${IMG}:${DEPLOY_SHA}"
          docker tag "api:${DEPLOY_SHA}" "${IMG}:latest"
          docker push "${IMG}:${DEPLOY_SHA}"
          docker push "${IMG}:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ vars.DEPLOY_ECS_CLUSTER_NAME_ADIEUU }}" \
            --service "${{ vars.DEPLOY_ECS_SERVICE_API_ADIEUU }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

  deploy-chat:
    needs: changes
    if: |
      needs.changes.outputs.chat == 'true' &&
      vars.DEPLOY_ECR_CHAT_REPOSITORY_URL_ADIEUU != '' &&
      vars.DEPLOY_ECS_CLUSTER_NAME_ADIEUU != '' &&
      vars.DEPLOY_ECS_SERVICE_CHAT_ADIEUU != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.changes.outputs.deploy_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_ADIEUU }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push chat image
        env:
          DEPLOY_SHA: ${{ needs.changes.outputs.deploy_sha }}
        run: |
          IMG="${{ vars.DEPLOY_ECR_CHAT_REPOSITORY_URL_ADIEUU }}"
          docker build --platform linux/amd64 -f apps/chat/Dockerfile \
            --build-arg FONTAWESOME_TOKEN="${FONTAWESOME_TOKEN}" \
            -t "chat:${DEPLOY_SHA}" .
          docker tag "chat:${DEPLOY_SHA}" "${IMG}:${DEPLOY_SHA}"
          docker tag "chat:${DEPLOY_SHA}" "${IMG}:latest"
          docker push "${IMG}:${DEPLOY_SHA}"
          docker push "${IMG}:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ vars.DEPLOY_ECS_CLUSTER_NAME_ADIEUU }}" \
            --service "${{ vars.DEPLOY_ECS_SERVICE_CHAT_ADIEUU }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"
